<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Terrain Preview — Petanque Master</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1A1510;
    color: #F5E6D0;
    font-family: 'Segoe UI', sans-serif;
    padding: 24px;
}
h1 { text-align: center; margin-bottom: 4px; font-size: 22px; }
.subtitle { text-align: center; color: #9B7BB8; margin-bottom: 20px; font-size: 13px; }
.terrains { display: flex; flex-wrap: wrap; justify-content: center; gap: 28px; }
.terrain-card { text-align: center; }
.terrain-card h2 { font-size: 14px; margin-bottom: 4px; color: #FFD700; }
.terrain-card .info { font-size: 11px; color: #9B7BB8; margin-bottom: 6px; }
.terrain-wrapper {
    position: relative;
    overflow: hidden;
    border: 2px solid #3A2E28;
    border-radius: 4px;
}
canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}
.controls {
    text-align: center; margin-bottom: 16px;
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
}
.controls button {
    background: #3A2E28; color: #F5E6D0; border: 1px solid #6B8E4E;
    padding: 7px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
}
.controls button:hover { background: #6B8E4E; }
.controls label { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.controls input[type=range] { width: 80px; }
</style>
</head>
<body>

<h1>Terrain Preview</h1>
<p class="subtitle">180x420 — seamless texture + scatter objects — x2</p>

<div class="controls">
    <button onclick="regenerateAll()">Regenerer</button>
    <button onclick="toggleScale()">x1 / x2</button>
    <label>Densite objets: <input type="range" id="density" min="0" max="30" value="12" oninput="regenerateAll()"> <span id="densityVal">12</span></label>
</div>

<div class="terrains" id="terrains"></div>

<script>
const BASE = 'assets/sprites/v2_new/terrains/';
const TW = 180, TH = 420;

// ============================================================
// ONE seamless texture per terrain + scatter objects on top
// ============================================================
const TERRAINS = {
    village: {
        name: 'Place du Village',
        bg: '#C4B090',
        texture: 'terre_battue/terre_02.png',
        objects: [
            { src: 'pierres/pierres_13.png', sizeMin: 10, sizeMax: 22, count: 8 },
            { src: 'pierres/pierres_07.png', sizeMin: 16, sizeMax: 30, count: 4 },
            { src: 'pierres/pierres_08.png', sizeMin: 12, sizeMax: 20, count: 3 },
        ],
    },
    plage: {
        name: 'Plage de la Ciotat',
        bg: '#E8D5B7',
        texture: 'sable/sable_10.png',
        objects: [
            { src: 'pierres/pierres_13.png', sizeMin: 8, sizeMax: 16, count: 6 },
            { src: 'pierres/pierres_07.png', sizeMin: 10, sizeMax: 18, count: 3 },
        ],
    },
    parc: {
        name: 'Parc Municipal',
        bg: '#6B8E4E',
        texture: 'herbe/herbe_15.png',
        objects: [
            { src: 'pierres/pierres_07.png', sizeMin: 14, sizeMax: 26, count: 5 },
            { src: 'pierres/pierres_13.png', sizeMin: 8, sizeMax: 16, count: 4 },
        ],
    },
    colline: {
        name: 'Colline aux Oliviers',
        bg: '#D4B080',
        texture: 'terre_battue/terre_02.png',
        tint: 'rgba(221, 204, 136, 0.18)',
        objects: [
            { src: 'pierres/pierres_08.png', sizeMin: 16, sizeMax: 32, count: 5 },
            { src: 'pierres/pierres_07.png', sizeMin: 14, sizeMax: 28, count: 4 },
            { src: 'pierres/pierres_13.png', sizeMin: 10, sizeMax: 18, count: 3 },
        ],
    },
    docks: {
        name: 'Les Docks',
        bg: '#7A7A70',
        texture: 'dalles/dalles_13.png',
        objects: [
            { src: 'gravier_impact/impact_01.png', sizeMin: 14, sizeMax: 28, count: 4 },
            { src: 'gravier_impact/impact_10.png', sizeMin: 12, sizeMax: 24, count: 3 },
            { src: 'pierres/pierres_13.png', sizeMin: 8, sizeMax: 14, count: 5 },
        ],
    },
};

// Load image as promise
function loadImg(src) {
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = BASE + src;
    });
}

// Scatter objects naturally — no grid, random position/rotation/scale/alpha
function scatterObjects(ctx, img, objDef, densityMul) {
    if (!img) return;
    const count = Math.round(objDef.count * densityMul);
    const margin = 4;
    for (let i = 0; i < count; i++) {
        const size = objDef.sizeMin + Math.random() * (objDef.sizeMax - objDef.sizeMin);
        const x = margin + Math.random() * (TW - margin * 2);
        const y = margin + Math.random() * (TH - margin * 2);
        const rot = Math.random() * Math.PI * 2;
        const alpha = 0.4 + Math.random() * 0.45;
        const flipX = Math.random() > 0.5 ? -1 : 1;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.scale(flipX, 1);
        ctx.globalAlpha = alpha;
        ctx.drawImage(img, -size/2, -size/2, size, size);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

async function renderTerrain(id) {
    const def = TERRAINS[id];
    const canvas = document.createElement('canvas');
    canvas.width = TW; canvas.height = TH;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // 1) Background color
    ctx.fillStyle = def.bg;
    ctx.fillRect(0, 0, TW, TH);

    // 2) Seamless tiled texture via createPattern
    const texImg = await loadImg(def.texture);
    if (texImg) {
        const pat = ctx.createPattern(texImg, 'repeat');
        ctx.fillStyle = pat;
        ctx.fillRect(0, 0, TW, TH);
    }

    // 3) Tint overlay
    if (def.tint) {
        ctx.fillStyle = def.tint;
        ctx.fillRect(0, 0, TW, TH);
    }

    // 4) Scatter detail objects
    const densityMul = parseInt(document.getElementById('density').value) / 12;
    document.getElementById('densityVal').textContent = document.getElementById('density').value;

    for (const objDef of def.objects) {
        const img = await loadImg(objDef.src);
        scatterObjects(ctx, img, objDef, densityMul);
    }

    // 5) Subtle vignette (#1A1510, no pure black)
    const grad = ctx.createRadialGradient(TW/2, TH/2, TH*0.3, TW/2, TH/2, TH*0.58);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(26,21,16,0.2)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, TW, TH);

    return canvas;
}

let scale = 2;

async function regenerateAll() {
    const container = document.getElementById('terrains');
    container.innerHTML = '';
    for (const [id, def] of Object.entries(TERRAINS)) {
        const card = document.createElement('div');
        card.className = 'terrain-card';

        const h2 = document.createElement('h2');
        h2.textContent = def.name;
        card.appendChild(h2);

        const info = document.createElement('div');
        info.className = 'info';
        info.textContent = `${def.objects.length} types d'objets`;
        card.appendChild(info);

        const wrapper = document.createElement('div');
        wrapper.className = 'terrain-wrapper';
        wrapper.style.width = (TW * scale) + 'px';
        wrapper.style.height = (TH * scale) + 'px';

        const canvas = await renderTerrain(id);
        wrapper.appendChild(canvas);
        card.appendChild(wrapper);
        container.appendChild(card);
    }
}

function toggleScale() {
    scale = scale === 2 ? 1 : 2;
    document.querySelectorAll('.terrain-wrapper').forEach(w => {
        w.style.width = (TW * scale) + 'px';
        w.style.height = (TH * scale) + 'px';
    });
}

regenerateAll();
</script>
</body>
</html>
