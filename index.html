<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="description" content="Petanque Master - Jeu de pétanque pixel art. 12 personnages, 5 terrains, mode Arcade !">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3A2E28">
    <link rel="icon" type="image/png" href="./assets/sprites/v2_new/ui/logo.png">
    <title>Petanque Master</title>
    <style>
        @font-face {
            font-family: 'PressStart2P';
            src: url('/assets/fonts/PressStart2P.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #3A2E28;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Preload pixel font to avoid FOUT */
        .font-preload {
            font-family: 'PressStart2P', monospace;
            position: absolute;
            left: -9999px;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <span class="font-preload">.</span>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
