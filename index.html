<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="description" content="Petanque Master - Jeu de pétanque pixel art. 12 personnages, 5 terrains, mode Arcade !">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3A2E28">
    <link rel="icon" type="image/png" href="./assets/sprites/v2_new/ui/logo.png">
    <title>Petanque Master</title>
    <style>
        @font-face {
            font-family: 'PressStart2P';
            src: url('/assets/fonts/PressStart2P.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #3A2E28;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        /* Anti-selection globale (requis CrazyGames/Poki) */
        * {
            -webkit-user-select: none;
            user-select: none;
        }
        /* Message rotation portrait → paysage */
        #portrait-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #1A1510;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }
        #portrait-overlay svg {
            animation: rotate-hint 1.5s ease-in-out infinite alternate;
        }
        @keyframes rotate-hint {
            from { transform: rotate(-15deg); }
            to   { transform: rotate(15deg); }
        }
        #portrait-overlay p {
            font-family: 'PressStart2P', monospace;
            font-size: 11px;
            color: #D4A574;
            text-align: center;
            line-height: 1.8;
            padding: 0 24px;
        }
        @media (orientation: portrait) {
            #portrait-overlay { display: flex; }
        }
        /* Preload pixel font to avoid FOUT */
        .font-preload {
            font-family: 'PressStart2P', monospace;
            position: absolute;
            left: -9999px;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <span class="font-preload">.</span>

    <!-- Message rotation portrait (visible uniquement en @media portrait sur mobile) -->
    <div id="portrait-overlay" aria-hidden="true">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="18" y="8" width="28" height="48" rx="4" stroke="#D4A574" stroke-width="3" fill="none"/>
            <line x1="18" y1="50" x2="46" y2="50" stroke="#D4A574" stroke-width="2"/>
            <path d="M8 32 L4 28 M8 32 L4 36" stroke="#C4854A" stroke-width="2" stroke-linecap="round"/>
            <path d="M56 32 L60 28 M56 32 L60 36" stroke="#C4854A" stroke-width="2" stroke-linecap="round"/>
            <path d="M10 32 Q32 20 54 32" stroke="#C4854A" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
        </svg>
        <p>Tournez votre ecran<br>en mode paysage<br>pour jouer !</p>
    </div>

    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
