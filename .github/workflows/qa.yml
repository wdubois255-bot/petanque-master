name: QA - Tests & Visual Regression
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter=verbose

  e2e-tests:
    name: E2E & Visual Regression (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Health + functional tests
      - name: Run health & functional tests
        run: npx playwright test game health
        continue-on-error: false

      # Stress tests
      - name: Run stress tests
        run: npx playwright test stress
        continue-on-error: true

      # Performance tests
      - name: Run performance tests
        run: npx playwright test performance
        continue-on-error: true

      # Visual regression (may fail if baselines don't exist yet)
      - name: Run visual regression tests
        run: npx playwright test visual-regression
        continue-on-error: true

      # Upload reports and artifacts on failure
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (videos, traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Upload visual snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: tests/e2e/snapshots/
          retention-days: 30
